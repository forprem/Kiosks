name: Deploy Frontend to Firebase Hosting

on:
  push:
    branches: [main]
    paths:
      - frontend/**
      - firebase.json
      - .firebaserc
      - .github/workflows/deploy-frontend.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Deploy to Firebase Hosting (live)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KIOSKS_500101 }}
          channelId: live
          projectId: kiosks-500101
